name: CI/CD Pipeline

on:
  push:
    branches: [ dev ]


env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/aschett/workout-backend
  IMAGE_FRONTEND: ghcr.io/aschett/workout-frontend

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5

        with:
          go-version: 1.24.4

      - name: Run Go tests
        run: |
          cd backend
          go test ./...

  release:
    runs-on: ubuntu-latest
    needs: test

    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: ${{ steps.semantic.outputs.new_release_published == 'true' }}
        run: |
          IMAGE=$IMAGE_BACKEND
          VERSION=${{ steps.semantic.outputs.new_release_version }}
          docker build -t $IMAGE:$VERSION -f ./backend/Dockerfile ./backend/
          docker push $IMAGE:$VERSION

      - name: Build and push frontend image
        if: ${{ steps.semantic.outputs.new_release_published == 'true' }}
        run: |
          IMAGE=$IMAGE_FRONTEND
          VERSION=${{ steps.semantic.outputs.new_release_version }}
          docker build -t $IMAGE:$VERSION -f ./frontend/Dockerfile ./frontend/
          docker push $IMAGE:$VERSION
      
      # sed is to update the version in the deployment yamls
      - name: Update the GitOps repository
        env:
            GIT_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"

            rm -rf gitops
            git clone https://x-access-token:${GIT_TOKEN}@github.com/aschett/gitops-workout-webapp.git gitops
            cd gitops

            VERSION=${{ steps.semantic.outputs.new_release_version }}
            sed -i "s|ghcr.io/aschett/workout-backend:.*|ghcr.io/aschett/workout-backend:$VERSION|g" backend/deployment.yaml

            sed -i "s|ghcr.io/aschett/workout-frontend:.*|ghcr.io/aschett/workout-frontend:$VERSION|g" frontend/deployment.yaml

            git add backend/deployment.yaml frontend/deployment.yaml
            git commit -m "chore: deploy backend and frontend $VERSION"
            git push