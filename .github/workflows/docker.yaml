name: Build and Release with Semantic Versioning

on:
  push:
    branches:
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/aschett/workout-backend
  IMAGE_FRONTEND: ghcr.io/aschett/workout-frontend

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: ${{ steps.semantic.outputs.new_release_published == 'true' }}
        run: |
          IMAGE=$IMAGE_BACKEND
          VERSION=${{ steps.semantic.outputs.new_release_version }}

          docker build -t $IMAGE:$VERSION -f ./backend/Dockerfile .

          docker push $IMAGE:$VERSION

      - name: Build and push frontend image
        if: ${{ steps.semantic.outputs.new_release_published == 'true' }}
        run: |
          IMAGE=$IMAGE_FRONTEND
          VERSION=${{ steps.semantic.outputs.new_release_version }}

          docker build -t $IMAGE:$VERSION -f ./frontend/Dockerfile .

          docker push $IMAGE:$VERSION